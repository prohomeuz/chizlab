# Host Nginx server block for the landing (chizlab.uz).
# Copy to /etc/nginx/sites-available/chizlab.uz, enable, then run certbot.
#   sudo ln -s /etc/nginx/sites-available/chizlab.uz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d chizlab.uz -d www.chizlab.uz

# HTTP — www->apex redirect + certbot challenge
server {
    listen 80;
    server_name chizlab.uz www.chizlab.uz;
    return 301 https://chizlab.uz$request_uri;
}

# HTTPS — www->apex redirect
server {
    listen 443 ssl http2;
    server_name www.chizlab.uz;

    ssl_certificate /etc/letsencrypt/live/chizlab.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chizlab.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://chizlab.uz$request_uri;
}

# HTTPS — apex (landing)
server {
    listen 443 ssl http2;
    server_name chizlab.uz;

    ssl_certificate /etc/letsencrypt/live/chizlab.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chizlab.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
