# Host Nginx server block for the landing (chizlab.uz).
# Copy to /etc/nginx/sites-available/chizlab.uz, enable, then run certbot.
#   sudo ln -s /etc/nginx/sites-available/chizlab.uz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d chizlab.uz -d www.chizlab.uz

server {
    listen 80;
    server_name chizlab.uz www.chizlab.uz;

    # Redirect www -> apex (optional; certbot will add the 443 blocks)
    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
